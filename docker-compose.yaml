version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mbti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mbti_log}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12356a@!!@}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-8086}:5432"
    volumes:
      - mbti_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: "256mb"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_AI_API_BASE: ${VITE_AI_API_BASE:-}
        VITE_LOG_API_BASE: ${VITE_LOG_API_BASE:-http://101.96.66.232:8088}
    container_name: mbti-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      # Connect to postgres service over docker network (not via host-mapped 8086)
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-mbti_log}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-12356a@!!}
    ports:
      - "${API_PORT:-8088}:4000"
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mbti_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-12356a@!!}
    ports:
      - "${PGADMIN_PORT:-8087}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  mbti_postgres_data:
  pgadmin_data: